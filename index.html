<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Starry Picnic</title>

  <link rel="icon" href="data:,">

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%;height:100%;background:#0a0520;overflow:hidden;
      font-family:'Segoe UI','Helvetica Neue',sans-serif; }
    #canvas { display:block;cursor:crosshair;position:fixed;top:0;left:0; }
    #hud    { position:fixed;inset:0;pointer-events:none;z-index:10; }
    #controls { position:fixed;bottom:16px;right:16px;font-size:11px;
      color:rgba(255,255,255,0.32);text-align:right;pointer-events:none;
      z-index:5;line-height:1.7; }
    #loader { position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:#0a0520;z-index:100;
      gap:18px;color:#fff;font-size:18px;letter-spacing:2px;transition:opacity 0.5s; }
    #loader-bar-wrap { width:220px;height:6px;background:rgba(255,255,255,0.12);
      border-radius:999px;overflow:hidden; }
    #loader-bar { height:100%;width:0%;background:linear-gradient(90deg,#b060ff,#ff60a0);
      border-radius:999px;transition:width 0.3s ease; }
  </style>
</head>
<body>

  <div id="loader">
    <div style="font-size:36px">✨</div>
    <div>STARRY PICNIC</div>
    <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
    <div style="font-size:12px;opacity:0.5" id="loader-status">Loading…</div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="controls">
    WASD · move &nbsp;|&nbsp; Mouse · look<br>
    E / Click · interact &nbsp;|&nbsp; 1–5 · skip level
  </div>

  <script type="module">
    const bar    = document.getElementById('loader-bar');
    const status = document.getElementById('loader-status');
    let prog = 0;
    const ticker = setInterval(() => {
      prog = Math.min(prog + Math.random() * 10, 88);
      bar.style.width = prog + '%';
    }, 150);

    try {
      status.textContent = 'Building anime world…';
      await import('./js/main.js');
      clearInterval(ticker);
      bar.style.width = '100%';
      status.textContent = 'Ready!';
      await new Promise(r => setTimeout(r, 350));
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 500);
    } catch (err) {
      clearInterval(ticker);
      document.getElementById('loader').innerHTML =
        '<div style="font-size:28px">⚠️</div>' +
        '<div style="color:#ff8080;font-size:15px;max-width:480px;text-align:center;line-height:1.7">' +
        '<b>Error:</b> ' + err.message +
        '<br><span style="font-size:12px;opacity:0.7">Open DevTools (F12) → Console for details.<br>' +
        'Run via <code>python3 -m http.server 8080</code> and visit <code>http://localhost:8080</code></span></div>';
      console.error(err);
    }

    
  </script>
</body>
</html>
